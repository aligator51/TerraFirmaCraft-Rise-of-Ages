//project

allprojects {
    group = mod_group_id
    version = mod_version

    repositories {
        mavenCentral()
    }
}

subprojects {
    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
    }

}

task copyCoreJarToMods(type: Copy) {
    def modsDir = file("$projectDir/mod/run/mods")
    from file('/core/build/libs/core-1.0.0.jar')
    into modsDir
}
